<header class="pg-header">
  <h1 class="pg-title">ngx-json-editor <span class="pg-badge">playground</span></h1>
  <label class="pg-field">
    <span>Theme</span>
    <select [value]="theme()" (change)="toggleTheme($any($event.target).value)">
      @for (t of themes; track t) {
        <option [value]="t">{{ t }}</option>
      }
    </select>
  </label>
</header>

<main class="pg-main">
  <ngx-json-workspace
    [(left)]="left"
    [(right)]="right"
    leftTitle="New document 2"
    rightTitle="New document 1"
    [theme]="theme()"
  />
</main>
